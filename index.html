<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoidAtmos - Final</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #00ffcc; font-family: sans-serif; text-align: center; padding: 15px; margin: 0; }
        .card { border: 2px solid #00ffcc; padding: 20px; border-radius: 20px; background: #0a0a0a; max-width: 400px; margin: 20px auto; box-shadow: 0 0 15px #00ffcc33; }
        .bar-bg { width: 100%; height: 10px; background: #222; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: #00ffcc; box-shadow: 0 0 10px #00ffcc; }
        input, button, label { display: block; width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #00ffcc; background: transparent; color: #00ffcc; font-weight: bold; box-sizing: border-box; cursor: pointer; }
        .btn-play { background: #00ffcc; color: #000; border: none; font-size: 1.3rem; margin-top: 10px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .active { background: #00ffcc33; border-width: 3px; box-shadow: 0 0 10px #00ffcc55; }
        #status { font-size: 0.8rem; color: yellow; margin: 10px 0; font-family: monospace; }
        hr { border: 0.5px solid #333; margin: 20px 0; }
    </style>
</head>
<body onclick="unlockAudio()">
    <div class="card">
        <h1>VOIDATMOS</h1>
        <div id="status">TAP TO START</div>
        <div class="bar-bg"><div id="bar"></div></div>

        <label for="fIn" id="fLabel">📁 1. LOAD MP3</label>
        <input type="file" id="fIn" accept="audio/*" onchange="hLoad(event)" style="display:none">
        <button onclick="document.getElementById('fIn').click()">SELECT MUSIC FILE</button>
        
        <div class="controls">
            <button id="lB" onclick="setCh('left')">UNIT L</button>
            <button id="rB" onclick="setCh('right')">UNIT R</button>
        </div>

        <button class="btn-play" onclick="hAct('play')">▶ PLAY SYNC</button>
        <div class="controls">
            <button onclick="hAct('pause')" style="color:#ffa500; border-color:#ffa500;">PAUSE</button>
            <button onclick="hAct('stop')" style="color:#ff4444; border-color:#ff4444;">STOP</button>
        </div>

        <hr>
        <input type="text" id="rId" placeholder="Room Name">
        <div class="controls">
            <button onclick="sPeer(true)">CREATE</button>
            <button onclick="sPeer(false)">JOIN</button>
        </div>
    </div>

    <script>
        let peer, conn, audio = new Audio(), ctx, panner, splitter, merger, side = 'left';

        function unlockAudio() {
            if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
            if(ctx.state === 'suspended') {
                ctx.resume();
                document.getElementById('status').innerText = "SYSTEM ACTIVE";
            }
        }

        function hLoad(e) {
            unlockAudio();
            if(!e.target.files[0]) return;
            audio.src = URL.createObjectURL(e.target.files[0]);
            document.getElementById('fLabel').innerText = "FILE LOADED";
            audio.ontimeupdate = () => document.getElementById('bar').style.width = (audio.currentTime/audio.duration*100) + "%";
        }

        function setCh(s) {
            unlockAudio();
            side = s;
            if(!splitter) {
                const src = ctx.createMediaElementSource(audio);
                splitter = ctx.createChannelSplitter(2);
                merger = ctx.createChannelMerger(2);
                panner = ctx.createStereoPanner();
                src.connect(splitter);
            }
            try { splitter.disconnect(); merger.disconnect(); } catch(err){}
            
            if(s === 'left') {
                splitter.connect(merger, 0, 0); splitter.connect(merger, 0, 1);
            } else {
                splitter.connect(merger, 1, 0); splitter.connect(merger, 1, 1);
            }
            merger.connect(panner);
            panner.connect(ctx.destination);
            
            document.getElementById('lB').className = (s === 'left' ? 'active' : '');
            document.getElementById('rB').className = (s === 'right' ? 'active' : '');
            document.getElementById('status').innerText = s.toUpperCase() + " READY";
        }

        function hAct(c) {
            unlockAudio();
            eCmd(c);
            if(conn && conn.open) conn.send({ c });
        }

        function eCmd(c) {
            if(!audio.src) return alert("Load music first");
            if(c === 'play') {
                audio.play();
                const n = ctx.currentTime;
                panner.pan.setValueAtTime(0, n);
                panner.pan.linearRampToValueAtTime(side === 'left' ? -0.3 : 0.3, n + 4);
            } else if(c === 'pause') audio.pause();
            else if(c === 'stop') { audio.pause(); audio.currentTime = 0; }
            document.getElementById('status').innerText = "STATE: " + c.toUpperCase();
        }

        function sPeer(m) {
            unlockAudio();
            const id = document.getElementById('rId').value;
            if(peer) peer.destroy();
            peer = new Peer(m ? id : null);
            peer.on('open', () => {
                document.getElementById('status').innerText = m ? "WAITING..." : "JOINING...";
                if(!m) { conn = peer.connect(id); setup(); }
            });
            peer.on('connection', c => { conn = c; setup(); });
        }

        function setup() {
            document.getElementById('status').innerText = "CONNECTED";
            conn.on('data', d => eCmd(d.c));
        }
    </script>
</body>
</html>
